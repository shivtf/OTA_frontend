# pubspec.yaml
# Wanderly — Production-ready travel app
#
# Run after updating:
#   flutter pub get

name: wanderly
description: Wanderly — AI-powered travel booking app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── HTTP & Networking ─────────────────────────────────────────────
  http: ^1.2.1

  # ── State Management ──────────────────────────────────────────────
  provider: ^6.1.2

  # ── Local Storage ─────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  flutter_svg: ^2.0.10+1

  country_picker: ^2.0.27

  # ── Deep Links ────────────────────────────────────────────────────
  # Handles otaapp:// scheme for email verification
  app_links: ^6.3.2

  # ── Payments ──────────────────────────────────────────────────────
  flutter_stripe: ^10.1.1

  # ── Fonts ─────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Icons ─────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── UI Utilities ──────────────────────────────────────────────────
  intl: ^0.19.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Add your assets here:
  # assets:
  #   - assets/images/
  #   - assets/icons/
